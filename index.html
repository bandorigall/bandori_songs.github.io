<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뱅드림 발매곡 목록</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --logo-height: 120px;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }
        .nav-header {
            background: #fff;
            border-bottom: 1px solid #f1f1f1;
            padding: 20px 25px;
        }
        .last-update {
            font-size: 11px;
            color: #aaa;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            text-align: right;
        }

        .tab-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .tab-button {
            padding: 10px 5px;
            font-size: 13px;
            font-weight: 700;
            border: 1px solid #eee;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #888;
            border-radius: 12px;
            text-align: center;
            word-break: keep-all;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .tab-button:hover { background-color: #f0f0f0; color: #333; }
        .tab-button.active {
            background-color: #333;
            color: #fff;
            border-color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .band-logo-area {
            text-align: center;
            padding: 30px 0 20px 0;
            height: var(--logo-height);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .band-logo-area img {
            height: 100%;
            width: auto;
            max-width: 90%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .band-logo-area h1 {
            margin: 0;
            font-size: 2em;
            color: #333;
        }

        .content { display: none; padding-bottom: 40px; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .table-wrapper { overflow-x: auto; padding: 0 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid #eee;
        }
        td {
            padding: 12px 16px;
            vertical-align: middle;
            background: #fff;
            border-top: 1px solid #f9f9f9;
            border-bottom: 1px solid #f9f9f9;
        }
        td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; border-left: 1px solid #f9f9f9; }
        td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; border-right: 1px solid #f9f9f9; }

        .song-info-wrapper {
            display: flex; align-items: center; min-width: 200px; padding: 5px;
            border-radius: 8px; transition: background-color 0.2s;
        }
        .clickable-song { cursor: pointer; }
        .clickable-song:hover { background-color: #f1f3f5; }
        .clickable-song:active { background-color: #e9ecef; transform: scale(0.99); }

        .album-thumb {
            width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
            margin-right: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; background-color: #eee;
        }
        .song-text { display: flex; flex-direction: column; }
        .song-title-main { font-size: 1.05em; font-weight: 700; color: #333; margin-bottom: 2px; }
        .song-title-sub { font-size: 0.8em; color: #999; }

        .meta-info { display: flex; flex-direction: column; gap: 4px; font-size: 12px; min-width: 100px; }
        .meta-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .release-date { color: #888; font-family: monospace; letter-spacing: -0.5px; }
        .meta-desc { color: #666; font-size: 11px; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: inline-block; }
        .badge-original { background-color: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }
        .badge-cover { background-color: #fff3e0; color: #f57c00; border: 1px solid #ffe0b2; }
        .badge-tieup { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            text-decoration: none; font-weight: 600; padding: 6px 12px;
            border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap;
        }
        .btn-link { background-color: #f1f3f5; color: #495057; }
        .btn-link:hover { background-color: #e9ecef; color: #212529; }

        .source-container { margin-top: 30px; padding-top: 15px; border-top: 1px dashed #eee; text-align: center; }
        .source-link-btn {
            display: inline-block; padding: 5px 12px; background-color: #f1f3f5;
            color: #868e96; text-decoration: none; border-radius: 15px; font-size: 11px; font-weight: 500;
        }
        .footer { margin-top: auto; font-size: 11px; color: #ccc; text-align: center; padding-bottom: 10px; }

        /* 모달 창 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 1000;
        }
        .modal-box {
            position: relative; background: #fff; width: 90%; max-width: 500px;
            margin: 8% auto; border-radius: 20px; max-height: 80vh;
            display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header { padding: 20px 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body {
            padding: 30px;
            overflow-y: auto;
            line-height: 1.7; font-size: 16px; text-align: center; color: #444;
        }
        /* 가사 3색 분리 (원어/발음/번역) */
        .lyrics-block { margin-bottom: 18px; }
        .lyrics-block:last-child { margin-bottom: 0; }
        .lyrics-block p { margin: 2px 0; }
        .ly-ja  { font-size: 15px; color: #2d3436; font-weight: 600; }
        .ly-rom { font-size: 13px; color: #adb5bd; }
        .ly-ko  { font-size: 14px; color: #e64980; font-weight: 500; }
        .close-btn { font-size: 28px; cursor: pointer; border: none; background: none; color: #ccc; }

        @media (max-width: 600px) {
            th { display: none; }
            .tab-group { grid-template-columns: repeat(3, 1fr); }
            :root { --logo-height: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <div class="last-update" id="last-update">Last Update: -</div>
        <div class="tab-group" id="tab-nav"></div>
    </div>
    <div id="tables"></div>
</div>

<div class="footer">made by Bangbung Kim</div>

<div id="lyrics-modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modal-title" style="margin:0; font-size:1.2em;"></h3>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 밴드별 설정 (convert_html.py 의 csv_files 와 동일)
// ─────────────────────────────────────────────────────────────
const BANDS = [
    { file: "poppin_party.csv",      name: "Poppin'Party",        logo: "poppin_party.png" },
    { file: "afterglow.csv",         name: "Afterglow",           logo: "afterglow.webp" },
    { file: "pastel_palettes.csv",   name: "Pastel＊Palettes",    logo: "pastel_palettes.png" },
    { file: "roselia.csv",           name: "Roselia",             logo: "roselia.png" },
    { file: "hello_happy_world.csv", name: "Hello, Happy World!",  logo: "hello_happy_world.png" },
    { file: "ras.csv",               name: "RAISE A SUILEN",      logo: "ras.svg" },
    { file: "morfonica.csv",         name: "Morfonica",           logo: "morfonica.webp" },
    { file: "mygo.csv",              name: "MyGO!!!!!",           logo: "mygo.webp" },
    { file: "ave.csv",               name: "Ave Mujica",          logo: "ave.webp" },
    { file: "yumemita.csv",          name: "夢限大みゅーたいぷ",  logo: "yumemita.webp" },
    { file: "millsage.csv",          name: "millsage",            logo: "millsage.webp" },
    { file: "ikkadumbrock.csv",      name: "一家Dumb Rock",       logo: "ikkadumbrock.webp" },
    { file: "others.csv",            name: "기타",                logo: "bang_dream.png" },
    { file: "toge.csv",              name: "トゲナシトゲアリ",    logo: "toge.webp" },
];
const LYRICS_FOLDER = "lyrics";

// ─────────────────────────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────────────────────────
function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}

// CSV 파서 (따옴표/쉼표/개행/"" 이스케이프 처리, BOM 제거)
function parseCSV(text) {
    text = text.replace(/^﻿/, "");
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
            if (c === '"') {
                if (text[i+1] === '"') { field += '"'; i++; }
                else inQuotes = false;
            } else field += c;
        } else {
            if (c === '"') inQuotes = true;
            else if (c === ',') { row.push(field); field = ""; }
            else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
            else if (c === '\r') { /* skip */ }
            else field += c;
        }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    if (!rows.length) return [];
    const header = rows[0].map(h => h.trim());
    return rows.slice(1)
        .filter(r => r.some(v => v && v.trim()))
        .map(r => {
            const o = {};
            header.forEach((h, idx) => o[h] = (r[idx] ?? "").trim());
            return o;
        });
}

// 가사 파일명: Windows 금지문자 제거 (cache_to_files.py 와 동일 규칙)
function lyricsUrl(title) {
    const safe = title.replace(/[\\/:*?"<>|]/g, "").trim();
    return `${LYRICS_FOLDER}/${encodeURIComponent(safe)}.txt`;
}

// 가사 3색 분리 (convert_html.py 의 format_lyrics 이식)
function hasHangul(s) { return /[가-힣]/.test(s); }
function formatLyrics(raw) {
    let html = "";
    for (const block of raw.trim().split(/\n{2,}/)) {
        const lines = block.split("\n").filter(l => l.trim());
        if (!lines.length) continue;
        const groups = []; let cur = null;
        for (const ln of lines) {
            if (hasHangul(ln)) {
                if (cur === null) cur = { ja: [], kr: [] };
                cur.kr.push(ln);
            } else {
                if (cur && cur.kr.length) { groups.push(cur); cur = null; }
                if (cur === null) cur = { ja: [], kr: [] };
                cur.ja.push(ln);
            }
        }
        if (cur) groups.push(cur);
        const parts = [];
        for (const g of groups) {
            for (const j of g.ja) parts.push(["ly-ja", j]);
            const no = g.ja.length, nk = g.kr.length;
            if (no === 1 && nk === 2) {
                parts.push(["ly-rom", g.kr[0]]);
                parts.push(["ly-ko", g.kr[1]]);
            } else if (no === 1 && nk >= 3) {
                parts.push(["ly-rom", g.kr[0]]);
                for (const x of g.kr.slice(1)) parts.push(["ly-ko", x]);
            } else {
                for (const x of g.kr) parts.push(["ly-ko", x]);
            }
        }
        const inner = parts.map(([c, t]) => `<p class="${c}">${escapeHtml(t)}</p>`).join("");
        html += `<div class="lyrics-block">${inner}</div>`;
    }
    return html;
}

// 메타정보 셀 (badge + 발매일 + Original by)
function metaInfo(row) {
    const date = (row["발매일 / 커버일"] || "-").trim();
    const type = (row["곡유형"] || "").trim();
    const artist = (row["원곡가수"] || "").trim();
    let badge = "", desc = "";
    if (type.includes("오리지널")) badge = '<span class="badge badge-original">ORIGINAL</span>';
    else if (type.includes("타이업")) { badge = '<span class="badge badge-tieup">TIE-UP</span>'; if (artist) desc = `Original by ${artist}`; }
    else if (type.includes("커버")) { badge = '<span class="badge badge-cover">COVER</span>'; if (artist) desc = `Original by ${artist}`; }
    let h = `<div class="meta-info"><div class="meta-top">${badge}<span class="release-date">${escapeHtml(date)}</span></div>`;
    if (desc) h += `<span class="meta-desc">${escapeHtml(desc)}</span>`;
    h += "</div>";
    return h;
}

function linkBtn(url) {
    if (!url || !url.trim().startsWith("http")) return "";
    return `<a href="${escapeHtml(url)}" target="_blank" class="btn btn-link">Listen</a>`;
}

// ─────────────────────────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────────────────────────
function renderBand(rows) {
    const table = document.createElement("table");
    const tbody = document.createElement("tbody");
    for (const row of rows) {
        const titleJp = (row["제목(원어)"] || "").trim();
        const titleKr = (row["제목(한국어)"] || "").trim();
        const cover = (row["앨범커버"] || "").trim();
        const extLink = (row["번역가사 링크"] || "").trim();
        const hasLyrics = extLink.length > 0;

        const img = cover
            ? `<img src="${escapeHtml(cover)}" class="album-thumb" alt="cover" loading="lazy">`
            : '<div class="album-thumb" style="background:#f0f0f0;"></div>';
        let text = `<div class="song-text"><span class="song-title-main">${escapeHtml(titleJp)}</span>`;
        if (titleKr) text += `<span class="song-title-sub">${escapeHtml(titleKr)}</span>`;
        text += "</div>";

        const wrapCls = "song-info-wrapper" + (hasLyrics ? " clickable-song" : "");
        const wrap = document.createElement("div");
        wrap.className = wrapCls;
        wrap.innerHTML = img + text;
        if (hasLyrics) {
            wrap.addEventListener("click", () => showLyrics(titleJp, extLink));
        }

        const tr = document.createElement("tr");
        const td1 = document.createElement("td"); td1.appendChild(wrap);
        const td2 = document.createElement("td"); td2.innerHTML = metaInfo(row);
        const td3 = document.createElement("td"); td3.innerHTML = linkBtn(row["링크"]);
        tr.append(td1, td2, td3);
        tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    const wrapper = document.createElement("div");
    wrapper.className = "table-wrapper";
    wrapper.appendChild(table);
    return wrapper;
}

// ─────────────────────────────────────────────────────────────
// 가사 모달 (클릭 시 지연 로딩)
// ─────────────────────────────────────────────────────────────
async function showLyrics(title, sourceUrl) {
    document.getElementById("modal-title").innerText = title;
    const body = document.getElementById("modal-body");
    body.innerHTML = "<p style='color:#aaa'>불러오는 중…</p>";
    document.getElementById("lyrics-modal").style.display = "block";
    document.body.style.overflow = "hidden";

    let html = "";
    try {
        const res = await fetch(lyricsUrl(title));
        if (res.ok) {
            const raw = await res.text();
            if (raw.trim()) html = formatLyrics(raw);
        }
    } catch (e) { /* ignore */ }

    if (!html) html = "<p style='color:#aaa'>가사 파일을 찾지 못했습니다.</p>";
    if (sourceUrl && sourceUrl.startsWith("http")) {
        html += `<div class="source-container"><a href="${escapeHtml(sourceUrl)}" target="_blank" class="source-link-btn">출처</a></div>`;
    }
    body.innerHTML = html;
    body.scrollTop = 0;
}

function closeModal() {
    document.getElementById("lyrics-modal").style.display = "none";
    document.body.style.overflow = "auto";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

function openTab(idx) {
    document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
    document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
    const tab = document.getElementById("tab-" + idx);
    if (tab) tab.classList.add("active");
    const btn = document.getElementById("tabbtn-" + idx);
    if (btn) btn.classList.add("active");
}

// ─────────────────────────────────────────────────────────────
// 부트스트랩: CSV 들을 fetch → 렌더
// ─────────────────────────────────────────────────────────────
async function main() {
    const tabNav = document.getElementById("tab-nav");
    const tables = document.getElementById("tables");

    const results = await Promise.all(BANDS.map(async b => {
        try {
            const res = await fetch(b.file);
            if (!res.ok) return null;
            return parseCSV(await res.text());
        } catch (e) { return null; }
    }));

    results.forEach((rows, idx) => {
        if (!rows) return;
        const b = BANDS[idx];

        const btn = document.createElement("button");
        btn.className = "tab-button";
        btn.id = "tabbtn-" + idx;
        btn.textContent = b.name;
        btn.addEventListener("click", () => openTab(idx));
        tabNav.appendChild(btn);

        const content = document.createElement("div");
        content.className = "content";
        content.id = "tab-" + idx;
        const logo = b.logo
            ? `<img src="${escapeHtml(b.logo)}" alt="${escapeHtml(b.name)}">`
            : `<h1>${escapeHtml(b.name)}</h1>`;
        const logoArea = document.createElement("div");
        logoArea.className = "band-logo-area";
        logoArea.innerHTML = logo;
        content.appendChild(logoArea);
        content.appendChild(renderBand(rows));
        tables.appendChild(content);
    });

    // 첫 탭 활성화
    const first = document.querySelector(".tab-button");
    if (first) first.click();

    const now = new Date();
    const pad = n => String(n).padStart(2, "0");
    document.getElementById("last-update").innerText =
        `Last Update: ${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
}

main();
</script>
</body>
</html>
